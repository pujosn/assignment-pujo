server {
    listen 80 default_server;
    server_name _;

    root /var/www/html;
    index index.php index.html;
    autoindex off;

    # Do not expose repository metadata or other hidden files.
    location ~ /\.git(?:/|$) {
        return 404;
    }

    # Replace the default Nginx Server header and hide PHP version details.
    more_set_headers "Server: MIFX Web Server";

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_hide_header X-Powered-By;
    }
}
