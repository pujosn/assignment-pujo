---
- name: Deploy the Docker Compose application
  hosts: web
  gather_facts: false

  tasks:
    - name: Create the Compose project directory
      ansible.builtin.file:
        path: "{{ compose_project_dir }}"
        state: directory
        mode: "0755"

    - name: Upload the Docker Compose definition
      ansible.builtin.copy:
        src: ../docker-compose.yml
        dest: "{{ compose_project_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Pull the newest application image
      ansible.builtin.command:
        cmd: "{{ compose_command }} pull"
        chdir: "{{ compose_project_dir }}"
      changed_when: true

    - name: Force recreate the Docker Compose service
      ansible.builtin.command:
        cmd: "{{ compose_command }} up -d --force-recreate --remove-orphans"
        chdir: "{{ compose_project_dir }}"
      changed_when: true
