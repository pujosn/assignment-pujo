version: '3.8'

services:
  web:
    image: pujosn/pujo-mifx-task:v1.8.0
    container_name: pujo-mifx-web-app
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./php-fpm/99-security.ini:/usr/local/etc/php/conf.d/99-security.ini:ro
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: pujo-mifx-db-app
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:?Set POSTGRES_SUPERUSER_PASSWORD in .env}
      POSTGRES_APP_USER: sre
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD:?Set POSTGRES_APP_PASSWORD in .env}
      POSTGRES_READONLY_USER: sre_read
      POSTGRES_READONLY_PASSWORD: ${POSTGRES_READONLY_PASSWORD:?Set POSTGRES_READONLY_PASSWORD in .env}
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/init/01-create-roles-and-database.sh:/docker-entrypoint-initdb.d/01-create-roles-and-database.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
